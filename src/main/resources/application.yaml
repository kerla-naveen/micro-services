server:
  port: 8081

spring:
  config:
    import:
      - configserver:${CONFIGSERVER:http://localhost:9296}
  profiles:
    active:
      - "prod"
  datasource:
    url: jdbc:mysql://${MYSQLSERVER:localhost:3306}/payment_db
    username: app_user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: PAYMENT-SERVICE

  jpa:
    hibernate:
      ddl-auto: update   # use validate / none in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

springdoc:
  swagger-ui:
    path: payment/swagger-ui.html
  api-docs:
    path: payment/v3/api-docs


management:
  endpoints:
    web:
      exposure:
        include: "*"
