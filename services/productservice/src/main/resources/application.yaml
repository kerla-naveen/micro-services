server:
  port: 8080

spring:
  config:
    import:
      - optional:configserver:http://localhost:9296
  profiles:
    active:
      - "default"
  datasource:
    url: jdbc:mysql://localhost:3306/product_db
    username: app_user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: product-service

  jpa:
    hibernate:
      ddl-auto: update   # use validate / none in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
springdoc:
  swagger-ui:
    path: product/swagger-ui.html
  api-docs:
    path: product/v3/api-docs
