server:
  port: 8081

spring:
  config:
    import:
      - optional:file:.env
      - optional:configserver:http://localhost:9296
  datasource:
    url: jdbc:mysql://localhost:3306/payment_db
    username: app_user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: PAYMENT-SERVICE

  jpa:
    hibernate:
      ddl-auto: update   # use validate / none in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
