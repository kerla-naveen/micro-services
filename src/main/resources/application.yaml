server:
  port: 9090

spring:
  application:
    name: CLOUD-GATEWAY
  config:
    import: configserver:http://localhost:9296
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ORDER-SERVICE
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: ORDER-SERVICE
                    fallbackUri: forward:/orderServiceFallBack

            - id: PAYMENT-SERVICE
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**
            - id: PRODUCT-SERVICE
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/product/**



