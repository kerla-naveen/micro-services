server:
  port: 9296

spring:
  application:
    name: CONFIG_SERVER

  cloud:
    config:
      server:
        git:
          uri: https://github.com/kerla-naveen/spring-app-config
          clone-on-start: true

eureka:
  instances:
    prefer-ip-address : true
  client:
    fetch-registry: true
    registry-with-eureka: true
    service-url :
      default-Zone: ${EUREKA_SERVER_ADDRESS:http://localhost:8761/eureka}
