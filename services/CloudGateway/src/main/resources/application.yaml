server:
  port: 9090

spring:
  application:
    name: cloud-gateway
  config:
    import: optional:configserver:http://localhost:9296
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "http://localhost:7080/realms/master"
          jwk-set-uri: "http://localhost:7080/realms/master/protocol/openid-connect/certs"

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/order/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: order-service
                    fallbackUri: forward:/orderServiceFallBack

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/payment/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/product/**
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 1s

#            - id: ORDER-SERVICE-DOCS
#              uri: lb://ORDER-SERVICE
#              predicates:
#                - Path= /order/v3/api-docs
#                - Path= /order/swagger-ui.html


resilience4j:
  circuitbreaker:
    instances:
      external:
        event-consumer-buffer-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state:
          seconds: 10
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health :
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    health:
      show-details: always

      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: order service
        url: order/v3/api-docs

      - name: payment service
        url : payment/v3/api-docs

      - name: product service
        url: product/v3/api-docs

