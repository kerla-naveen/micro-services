global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "cloudgateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["cloudgateway:9090"]

  - job_name: "serviceregistry"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["serviceregistry:8761"]

  - job_name: "configserver"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["configserver:9296"]

  - job_name: "orderservice"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["orderservice:8082"]