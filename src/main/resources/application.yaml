server:
  port: 8082

spring:
  config:
    import:
      - optional:file:.env
      - optional:configserver:http://localhost:9296 #optimal helps in booting even if configserver down
  datasource:
    url: jdbc:mysql://localhost:3306/order_db
    username: app_user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: ORDER-SERVICE

  jpa:
    hibernate:
      ddl-auto: update   # use validate / none in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

